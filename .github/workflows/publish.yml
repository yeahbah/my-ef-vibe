name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver to publish (e.g. 0.1.4). Leave empty to use tag or csproj.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/MyEfVibe/MyEfVibe.csproj)
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing efvibe version $VERSION"

  package-visualstudio-extension:
    needs: resolve-version
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Sync Visual Studio extension version
        shell: pwsh
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          [xml]$manifest = Get-Content "visualstudio-extension/source.extension.vsixmanifest"
          $ns = New-Object System.Xml.XmlNamespaceManager($manifest.NameTable)
          $ns.AddNamespace("vsix", "http://schemas.microsoft.com/developer/vsx-schema/2011")
          $identity = $manifest.SelectSingleNode("/vsix:PackageManifest/vsix:Metadata/vsix:Identity", $ns)
          $identity.Version = $env:VERSION
          $manifest.Save((Resolve-Path "visualstudio-extension/source.extension.vsixmanifest"))

      - name: Package Visual Studio extension
        shell: pwsh
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          dotnet restore "visualstudio-extension/MyEfVibe.VisualStudio.csproj"
          dotnet build "visualstudio-extension/MyEfVibe.VisualStudio.csproj" `
            -c Release `
            --no-restore `
            /p:DeployExtension=false `
            /p:TargetVsixContainerName="visualstudio-efvibe-$env:VERSION.vsix"
          New-Item -ItemType Directory -Force artifacts | Out-Null
          $vsix = Get-ChildItem "visualstudio-extension" -Recurse -Filter "visualstudio-efvibe-$env:VERSION.vsix" | Select-Object -First 1
          if (-not $vsix) {
            throw "Visual Studio VSIX package was not produced."
          }
          Copy-Item $vsix.FullName "artifacts/visualstudio-efvibe-$env:VERSION.vsix"

      - name: Upload Visual Studio extension package
        uses: actions/upload-artifact@v4
        with:
          name: visualstudio-extension
          path: artifacts/visualstudio-efvibe-${{ needs.resolve-version.outputs.version }}.vsix

  package-rider-extension:
    needs: resolve-version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.0.0'

      - name: Sync Rider extension version
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          sed -i "s/^pluginVersion=.*/pluginVersion=${VERSION}/" rider-extension/gradle.properties

      - name: Package Rider extension
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          mkdir -p artifacts
          cd rider-extension
          gradle buildPlugin --no-daemon
          zip_path="$(ls build/distributions/*.zip | head -n 1)"
          test -n "$zip_path"
          cp "$zip_path" "../artifacts/rider-efvibe-${VERSION}.zip"

      - name: Upload Rider extension package
        uses: actions/upload-artifact@v4
        with:
          name: rider-extension
          path: artifacts/rider-efvibe-${{ needs.resolve-version.outputs.version }}.zip

  publish:
    needs:
      - resolve-version
      - package-visualstudio-extension
      - package-rider-extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore src/MyEfVibe/MyEfVibe.csproj

      - name: Pack
        run: >
          dotnet pack src/MyEfVibe/MyEfVibe.csproj
          -c Release
          --no-restore
          -o ./artifacts
          /p:Version=${{ needs.resolve-version.outputs.version }}
          /p:PackageReleaseNotes="Release ${{ needs.resolve-version.outputs.version }}. See https://github.com/${{ github.repository }}/releases/tag/v${{ needs.resolve-version.outputs.version }}"

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./artifacts/efvibe.${{ needs.resolve-version.outputs.version }}.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Sync VS Code extension version
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          jq --arg v "$VERSION" '.version = $v' vscode-extension/package.json > vscode-extension/package.json.tmp
          mv vscode-extension/package.json.tmp vscode-extension/package.json

      - name: Package VS Code extension
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          mkdir -p artifacts
          cd vscode-extension
          npm ci
          npm run package
          test -f "vscode-efvibe-${VERSION}.vsix"
          cp "vscode-efvibe-${VERSION}.vsix" "../artifacts/vscode-efvibe-${VERSION}.vsix"

      - name: Download Visual Studio extension package
        uses: actions/download-artifact@v4
        with:
          name: visualstudio-extension
          path: ./artifacts

      - name: Download Rider extension package
        uses: actions/download-artifact@v4
        with:
          name: rider-extension
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-version.outputs.version }}
          name: v${{ needs.resolve-version.outputs.version }}
          generate_release_notes: true
          files: |
            ./artifacts/efvibe.${{ needs.resolve-version.outputs.version }}.nupkg
            ./artifacts/vscode-efvibe-${{ needs.resolve-version.outputs.version }}.vsix
            ./artifacts/visualstudio-efvibe-${{ needs.resolve-version.outputs.version }}.vsix
            ./artifacts/rider-efvibe-${{ needs.resolve-version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Open VSX
        continue-on-error: true
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [[ -z "$OVSX_PAT" ]]; then
            echo "OVSX_PAT secret is not set; skipping Open VSX."
            exit 0
          fi
          cd vscode-extension
          npx --yes ovsx publish "vscode-efvibe-${VERSION}.vsix" -p "$OVSX_PAT"

      - name: Publish to Visual Studio Marketplace
        continue-on-error: true
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [[ -z "$VSCE_PAT" ]]; then
            echo "VSCE_PAT secret is not set; skipping Marketplace."
            exit 0
          fi
          cd vscode-extension
          npx --yes @vscode/vsce publish "vscode-efvibe-${VERSION}.vsix" -p "$VSCE_PAT" \
            --baseImagesUrl "https://github.com/yeahbah/my-ef-vibe/raw/HEAD/vscode-extension/images"
