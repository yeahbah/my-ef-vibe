name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/MyEfVibe/MyEfVibe.csproj)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing efvibe version $VERSION"

      - name: Restore
        run: dotnet restore src/MyEfVibe/MyEfVibe.csproj

      - name: Pack
        run: >
          dotnet pack src/MyEfVibe/MyEfVibe.csproj
          -c Release
          --no-restore
          -o ./artifacts
          /p:Version=${{ steps.version.outputs.version }}
          /p:PackageReleaseNotes="Release ${{ steps.version.outputs.version }}. See https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./artifacts/efvibe.${{ steps.version.outputs.version }}.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
