name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver to publish (e.g. 0.1.4). Leave empty to use tag or csproj.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/MyEfVibe/MyEfVibe.csproj)
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing efvibe version $VERSION"

      - name: Restore
        run: dotnet restore src/MyEfVibe/MyEfVibe.csproj

      - name: Pack
        run: >
          dotnet pack src/MyEfVibe/MyEfVibe.csproj
          -c Release
          --no-restore
          -o ./artifacts
          /p:Version=${{ steps.version.outputs.version }}
          /p:PackageReleaseNotes="Release ${{ steps.version.outputs.version }}. See https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./artifacts/efvibe.${{ steps.version.outputs.version }}.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ./artifacts/efvibe.${{ steps.version.outputs.version }}.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
