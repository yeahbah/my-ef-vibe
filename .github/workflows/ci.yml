name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore MyEfVibe.slnx

      - name: Build
        run: dotnet build MyEfVibe.slnx -c Release --no-restore

      # Integration tests (live DBs) are local-only: tests/MyEfVibe.IntegrationTests — not run here.
      - name: Test
        run: dotnet test tests/MyEfVibe.Tests/MyEfVibe.Tests.csproj -c Release --no-build --verbosity normal

      - name: Pack
        run: >
          dotnet pack src/MyEfVibe/MyEfVibe.csproj
          -c Release
          --no-build
          -o ./artifacts
          /p:Version=0.0.0-ci.${{ github.run_number }}

      - name: Verify tool targets
        run: |
          test -f artifacts/efvibe.*.nupkg
          unzip -l artifacts/efvibe.*.nupkg | grep -E 'tools/net(8|9|10)\.0/any/myefvibe\.dll'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Build VS Code extension
        run: |
          cd vscode-extension
          npm ci
          npm run lint

  build-visualstudio-extension:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Package Visual Studio extension
        shell: pwsh
        run: |
          dotnet restore "visualstudio-extension/MyEfVibe.VisualStudio.csproj"
          dotnet build "visualstudio-extension/MyEfVibe.VisualStudio.csproj" `
            -c Release `
            --no-restore `
            /p:DeployExtension=false `
            /p:TargetVsixContainerName="visualstudio-efvibe-ci.vsix"
          $vsix = Get-ChildItem "visualstudio-extension" -Recurse -Filter "visualstudio-efvibe-ci.vsix" | Select-Object -First 1
          if (-not $vsix) {
            throw "Visual Studio VSIX package was not produced."
          }

  build-rider-extension:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Package Rider extension
        run: |
          cd rider-extension
          gradle buildPlugin --no-daemon
          test -n "$(ls build/distributions/*.zip)"

  release:
    needs:
      - build
      - build-visualstudio-extension
      - build-rider-extension
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip version bump commits
        id: skip
        run: |
          if [[ "${{ github.event.head_commit.message }}" == *"[skip ci]"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if commit already tagged
        id: tagged
        if: steps.skip.outputs.skip != 'true'
        run: |
          if git describe --tags --exact-match HEAD 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Commit already has tag: $(git describe --tags --exact-match HEAD)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        id: version
        if: steps.skip.outputs.skip != 'true' && steps.tagged.outputs.skip != 'true'
        run: |
          chmod +x .github/scripts/next-version.sh
          VERSION="$(.github/scripts/next-version.sh)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Next release version: $VERSION"

      - name: Create and push tag
        if: steps.skip.outputs.skip != 'true' && steps.tagged.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping."
            exit 0
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Sync version in repo
        if: steps.skip.outputs.skip != 'true' && steps.tagged.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/<Version>.*<\/Version>/<Version>${VERSION}<\/Version>/" src/MyEfVibe/MyEfVibe.csproj
          jq --arg v "$VERSION" '.tools.efvibe.version = $v' .config/dotnet-tools.json > .config/dotnet-tools.json.tmp
          mv .config/dotnet-tools.json.tmp .config/dotnet-tools.json
          jq --arg v "$VERSION" '.version = $v' vscode-extension/package.json > vscode-extension/package.json.tmp
          mv vscode-extension/package.json.tmp vscode-extension/package.json
          sed -i "s/^pluginVersion=.*/pluginVersion=${VERSION}/" rider-extension/gradle.properties
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("visualstudio-extension/source.extension.vsixmanifest")
          text = path.read_text()
          version = os.environ["VERSION"]
          text = re.sub(r'(<Identity\b[^>]*\bVersion=")[^"]+(")', rf'\g<1>{version}\2', text, count=1)
          path.write_text(text)
          PY
          if git diff --quiet; then
            echo "No file changes to commit."
            exit 0
          fi
          git add src/MyEfVibe/MyEfVibe.csproj .config/dotnet-tools.json vscode-extension/package.json visualstudio-extension/source.extension.vsixmanifest rider-extension/gradle.properties
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
